<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BarangayHiram - Barangay Equipment Lending System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .login-wrapper { min-height: 100vh; display: flex; flex-direction: column; }
    .login-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 100%;
      padding: 40px;
    }
    .barangay-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .barangay-logo svg { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
    .system-title { color: #0d6efd; font-weight: 700; font-size: 1.75rem; margin-bottom: 5px; }
    .system-subtitle { color: #6c757d; font-size: 0.9rem; margin-bottom: 30px; }
    .form-control:focus {
      border-color: #0d6efd;
      box-shadow: 0 0 0 0.2rem rgba(13,110,253,0.25);
    }
    .btn-login {
      background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
      border: none;
      padding: 12px;
      font-weight: 600;
      color: #fff;
      width: 100%;
      border-radius: 5px;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .btn-login:hover {
      background: linear-gradient(135deg, #0a58ca 0%, #084298 100%);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(13,110,253,0.4);
    }
    .btn-login:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    .footer {
      background: #343a40;
      color: #adb5bd;
      text-align: center;
      padding: 15px;
      font-size: 0.85rem;
    }
    .input-group-text { background: #f8f9fa; border-right: none; }
    .input-group .form-control { border-left: none; }
    .password-toggle { cursor: pointer; background: #f8f9fa; border-left: none; }
    .password-toggle:hover { background: #e9ecef; }
    .alert { display: none; }
  </style>
  <link href="/css/app.css" rel="stylesheet">
</head>
<body>

  <div class="login-wrapper">
    <div class="login-container">
      <div class="login-card">

        <!-- Logo -->
        <div class="barangay-logo">
          <svg viewBox="0 0 100 100" width="90" height="90">
            <circle cx="50" cy="50" r="48" fill="#0d6efd" />
            <circle cx="50" cy="50" r="44" fill="#0a58ca" />
            <line x1="50" y1="6" x2="50" y2="14" stroke="#ffc107" stroke-width="3" transform="rotate(0 50 50)" />
            <line x1="50" y1="6" x2="50" y2="14" stroke="#ffc107" stroke-width="3" transform="rotate(45 50 50)" />
            <line x1="50" y1="6" x2="50" y2="14" stroke="#ffc107" stroke-width="3" transform="rotate(90 50 50)" />
            <line x1="50" y1="6" x2="50" y2="14" stroke="#ffc107" stroke-width="3" transform="rotate(135 50 50)" />
            <line x1="50" y1="6" x2="50" y2="14" stroke="#ffc107" stroke-width="3" transform="rotate(180 50 50)" />
            <line x1="50" y1="6" x2="50" y2="14" stroke="#ffc107" stroke-width="3" transform="rotate(225 50 50)" />
            <line x1="50" y1="6" x2="50" y2="14" stroke="#ffc107" stroke-width="3" transform="rotate(270 50 50)" />
            <line x1="50" y1="6" x2="50" y2="14" stroke="#ffc107" stroke-width="3" transform="rotate(315 50 50)" />
            <circle cx="50" cy="50" r="38" fill="#ffffff" />
            <path d="M50 18 L72 28 L72 50 C72 65 62 75 50 82 C38 75 28 65 28 50 L28 28 Z" fill="#0d6efd" stroke="#0a58ca" stroke-width="1" />
            <polygon points="50,24 51.5,28 56,28 52.5,31 54,35 50,32 46,35 47.5,31 44,28 48.5,28" fill="#ffc107" />
            <polygon points="36,36 37.2,39 41,39 38,41.5 39,45 36,43 33,45 34,41.5 31,39 34.8,39" fill="#ffc107" />
            <polygon points="64,36 65.2,39 69,39 66,41.5 67,45 64,43 61,45 62,41.5 59,39 62.8,39" fill="#ffc107" />
            <path d="M50 48 L40 55 L40 68 L45 68 L45 60 L55 60 L55 68 L60 68 L60 55 Z" fill="#ffffff" />
            <rect x="47" y="62" width="6" height="6" fill="#0a58ca" />
          </svg>
        </div>

        <!-- Title -->
        <div class="text-center">
          <h1 class="system-title">BarangayHiram</h1>
          <p class="system-subtitle">Barangay Equipment Lending System<br />Brgy. 628, Zone 63, Manila</p>
        </div>

        <!-- Alerts -->
        <div class="alert alert-danger" id="errorAlert">
          <i class="bi bi-exclamation-circle me-2"></i>
          <span id="errorMessage">Invalid username or password.</span>
        </div>
        <div class="alert alert-success" id="successAlert">
          <i class="bi bi-check-circle me-2"></i>
          Login successful! Redirecting to dashboard...
        </div>

        <!-- Form with id="loginForm" — this is required! -->
        <form id="loginForm">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control" id="username" placeholder="Enter your username" required>
            </div>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
              <span class="input-group-text password-toggle" onclick="togglePassword()">
                <i class="bi bi-eye" id="toggleIcon"></i>
              </span>
            </div>
          </div>

          <button type="submit" class="btn-login mb-3" id="loginBtn">
            <i class="bi bi-box-arrow-in-right me-2"></i>Login
          </button>

          <div class="text-center">
            <small class="text-muted">
              <i class="bi bi-shield-lock me-1"></i>
              Authorized Personnel Only
            </small>
          </div>
        </form>

      </div>
    </div>

    <footer class="footer">
      <i class="bi bi-building me-1"></i>
      <span class="login-footer-meta">Barangay 628, Zone 63</span>
      <span class="mx-1">&copy;</span><span id="footerYear"></span>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>

    document.getElementById('footerYear').textContent = new Date().getFullYear();

    // If already logged in go to dashboard
    window.onload = function() {
      const token = localStorage.getItem('token');
      if (token) {
        window.location.href = '/pages/dashboard.html';
      }
    };

    // Toggle password visibility
    function togglePassword() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('toggleIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('bi-eye', 'bi-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('bi-eye-slash', 'bi-eye');
      }
    }

    // Handle login form
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const btn      = document.getElementById('loginBtn');

      // Hide both alerts
      document.getElementById('errorAlert').style.display   = 'none';
      document.getElementById('successAlert').style.display = 'none';

      // Show loading spinner on button
      btn.disabled  = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';

      try {
        // Call the login API
        const response = await fetch('/api/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username: username, password: password })
        });

        const data = await response.json();
        console.log('Login response:', data);

        if (response.ok) {
          // Save token and user info
          localStorage.setItem('token',     data.token);
          localStorage.setItem('full_name', data.user.full_name);
          localStorage.setItem('role',      data.user.role);
          localStorage.setItem('user',      JSON.stringify(data.user));

          // Show success message
          document.getElementById('successAlert').style.display = 'block';

          // Redirect to dashboard after 1 second
          setTimeout(function() {
            window.location.href = '/pages/dashboard.html';
          }, 1000);

        } else {
          // Show error message from server
          document.getElementById('errorMessage').textContent = data.message || 'Invalid username or password.';
          document.getElementById('errorAlert').style.display = 'block';
          btn.disabled  = false;
          btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Login';
        }

      } catch (error) {
        console.error('Login error:', error);
        document.getElementById('errorMessage').textContent = 'Cannot connect to server. Make sure the server is running.';
        document.getElementById('errorAlert').style.display = 'block';
        btn.disabled  = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Login';
      }
    });

  </script>
</body>
</html>
