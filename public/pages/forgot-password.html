<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - BarangayHiram</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/app.css" rel="stylesheet">
  <style>
    body { min-height: 100vh; background: var(--bh-bg); color: var(--bh-text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .auth-wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .auth-card { width: min(440px, 100%); background: var(--bh-surface); border: .5px solid var(--bh-border-soft); border-radius: var(--bh-radius-lg); padding: 26px; box-shadow: var(--bh-shadow-sm); }
    .brand-mark { width: 48px; height: 48px; border-radius: var(--bh-radius-lg); display: grid; place-items: center; background: var(--bh-accent); color: #fff; font-weight: 700; margin-bottom: 16px; }
    .auth-title { font-size: 24px; font-weight: 600; margin-bottom: 6px; }
    .auth-copy { color: var(--bh-text-muted); margin-bottom: 18px; }
    .btn-portal { width: 100%; min-height: 38px; border: 1px solid var(--bh-accent); border-radius: var(--bh-radius); background: var(--bh-accent); color: #fff; font-weight: 500; }
    .btn-portal:hover { background: var(--bh-accent-dark); border-color: var(--bh-accent-dark); }
  </style>
</head>
<body class="bh-ui">
  <main class="auth-wrap">
    <section class="auth-card">
      <div class="brand-mark">BH</div>
      <h1 class="auth-title">Forgot Password</h1>
      <p class="auth-copy">Enter your account email and BarangayHiram will send a password reset link through Supabase Auth.</p>

      <div class="alert d-none" id="messageBox"></div>

      <form id="forgotPasswordForm" novalidate>
        <div class="mb-3">
          <label class="form-label" for="email">Email address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input class="form-control" id="email" type="email" autocomplete="email" required>
          </div>
        </div>
        <button class="btn-portal" id="submitBtn" type="submit">Send reset link</button>
      </form>

      <div class="text-center mt-3">
        <a href="/pages/login.html" class="text-decoration-none">Back to login</a>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-browser.js"></script>
  <script>
    const safeMessage = 'If this email is registered, a password reset link has been sent.';

    function showMessage(type, message) {
      const box = document.getElementById('messageBox');
      box.className = 'alert alert-' + type;
      box.textContent = message;
      box.classList.remove('d-none');
    }

    document.getElementById('forgotPasswordForm').addEventListener('submit', async function(event) {
      event.preventDefault();
      const button = document.getElementById('submitBtn');
      const email = document.getElementById('email').value.trim();
      if (!email) {
        showMessage('danger', 'Please enter your email address.');
        return;
      }

      button.disabled = true;
      button.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Sending';
      try {
        const supabase = await window.getBarangayHiramSupabase();
        await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/reset-password'
        });
        showMessage('success', safeMessage);
      } catch (err) {
        showMessage('success', safeMessage);
      } finally {
        button.disabled = false;
        button.textContent = 'Send reset link';
      }
    });
  </script>
</body>
</html>
