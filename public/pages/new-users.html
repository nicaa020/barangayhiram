<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Users - BarangayHiram</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; background:#f0f2f5; }
    .sidebar { width:250px; min-height:100vh; background:linear-gradient(180deg,#6ba5fc 0%,#0a58ca 100%); position:fixed; top:0; left:0; z-index:100; display:flex; flex-direction:column; }
    .sidebar-brand { padding:20px; border-bottom:1px solid rgba(255,255,255,.2); text-align:center; display:flex; flex-direction:column; align-items:center; gap:5px; }
    .sidebar-nav { padding:15px 0; flex:1; }
    .sidebar-nav .nav-link { color:rgba(255,255,255,.8); padding:12px 20px; display:flex; align-items:center; gap:10px; transition:all .2s; font-size:.9rem; }
    .sidebar-nav .nav-link:hover, .sidebar-nav .nav-link.active { color:#fff; background:rgba(255,255,255,.15); border-left:3px solid #ffc107; }
    .sidebar-nav .nav-link i { font-size:1.1rem; width:20px; }
    .sidebar-footer { padding:15px 20px; border-top:1px solid rgba(255,255,255,.2); }
    .sidebar-footer .nav-link { color:rgba(255,255,255,.8); padding:8px 0; display:flex; align-items:center; gap:10px; font-size:.9rem; cursor:pointer; }
    .main-content { margin-left:250px; min-height:100vh; }
    .topbar { background:#fff; padding:15px 25px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 4px rgba(0,0,0,.08); position:sticky; top:0; z-index:99; }
    .topbar h4 { margin:0; font-weight:700; color:#333; font-size:1.1rem; }
    .topbar-right { display:flex; align-items:center; gap:15px; }
    .user-info .name { font-weight:600; color:#333; font-size:.9rem; text-align:right; }
    .user-info .role { color:#6c757d; font-size:.75rem; text-align:right; }
    .avatar, .user-avatar { width:38px; height:38px; background:#0d6efd; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:1rem; }
    .page-content { padding:25px; }
    .card { border:none; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.06); }
    .card-header { background:#fff; border-bottom:1px solid #f0f0f0; padding:15px 20px; font-weight:600; color:#333; border-radius:10px 10px 0 0 !important; }
    .table th { font-size:.82rem; color:#6c757d; font-weight:600; border-bottom:2px solid #f0f0f0; }
    .table td { font-size:.88rem; vertical-align:middle; }
    .badge { font-size:.75rem; padding:5px 10px; }
    .btn-action { padding:4px 10px; font-size:.8rem; }
    @media (max-width:768px) { .sidebar { position:static; width:100%; min-height:auto; } .main-content { margin-left:0; } .topbar { position:static; } }
  </style>
  <link href="/css/app.css" rel="stylesheet">
</head>
<body class="bh-ui">
  <div class="sidebar">
    <div class="sidebar-brand">
      <svg viewBox="0 0 100 100" width="55" height="55">
        <circle cx="50" cy="50" r="48" fill="#ffffff22" />
        <circle cx="50" cy="50" r="44" fill="#ffffff11" />
        <line x1="50" y1="6" x2="50" y2="14" stroke="#ffc107" stroke-width="3" transform="rotate(0 50 50)" />
        <line x1="50" y1="6" x2="50" y2="14" stroke="#ffc107" stroke-width="3" transform="rotate(45 50 50)" />
        <line x1="50" y1="6" x2="50" y2="14" stroke="#ffc107" stroke-width="3" transform="rotate(90 50 50)" />
        <line x1="50" y1="6" x2="50" y2="14" stroke="#ffc107" stroke-width="3" transform="rotate(135 50 50)" />
        <line x1="50" y1="6" x2="50" y2="14" stroke="#ffc107" stroke-width="3" transform="rotate(180 50 50)" />
        <line x1="50" y1="6" x2="50" y2="14" stroke="#ffc107" stroke-width="3" transform="rotate(225 50 50)" />
        <line x1="50" y1="6" x2="50" y2="14" stroke="#ffc107" stroke-width="3" transform="rotate(270 50 50)" />
        <line x1="50" y1="6" x2="50" y2="14" stroke="#ffc107" stroke-width="3" transform="rotate(315 50 50)" />
        <circle cx="50" cy="50" r="38" fill="#ffffff" />
        <path d="M50 18 L72 28 L72 50 C72 65 62 75 50 82 C38 75 28 65 28 50 L28 28 Z" fill="#0d6efd" stroke="#0a58ca" stroke-width="1" />
        <polygon points="50,24 51.5,28 56,28 52.5,31 54,35 50,32 46,35 47.5,31 44,28 48.5,28" fill="#ffc107" />
        <polygon points="36,36 37.2,39 41,39 38,41.5 39,45 36,43 33,45 34,41.5 31,39 34.8,39" fill="#ffc107" />
        <polygon points="64,36 65.2,39 69,39 66,41.5 67,45 64,43 61,45 62,41.5 59,39 62.8,39" fill="#ffc107" />
        <path d="M50 48 L40 55 L40 68 L45 68 L45 60 L55 60 L55 68 L60 68 L60 55 Z" fill="#ffffff" />
        <rect x="47" y="62" width="6" height="6" fill="#0a58ca" />
      </svg>
      <h5 class="mb-0 mt-1" style="font-weight:700;">BarangayHiram</h5>
      <small>Brgy. 628, Zone 63</small>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="equipment.html" class="nav-link"><i class="bi bi-box-seam"></i> Equipment</a>
      <a href="borrowers.html" class="nav-link"><i class="bi bi-people"></i> Borrowers</a>
      <a href="transactions.html" class="nav-link"><i class="bi bi-arrow-left-right"></i> Transactions</a>
      <a href="returns.html" class="nav-link"><i class="bi bi-arrow-return-left"></i> Returns</a>
      <a href="reports.html" class="nav-link"><i class="bi bi-file-earmark-bar-graph"></i> Reports</a>
      <a href="new-users.html" class="nav-link active admin-only"><i class="bi bi-person-check"></i> New Users</a>
      <a href="staff.html" class="nav-link admin-only"><i class="bi bi-person-gear"></i> Staff Accounts</a>
    </nav>
    <div class="sidebar-footer"><a class="nav-link" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</a></div>
  </div>

  <div class="main-content">
    <div class="topbar">
      <h4>New user accounts</h4>
      <div class="topbar-right"><div class="user-info"><div class="name" id="userName">Loading...</div><div class="role" id="userRole"></div></div><div class="avatar" id="userAvatar">A</div></div>
    </div>

    <div class="page-content">
      <div class="card mb-4 bh-filter-card">
        <div class="card-body">
          <div class="row g-2 align-items-center">
            <div class="col-md-6"><div class="input-group"><span class="input-group-text"><i class="bi bi-search"></i></span><input type="text" class="form-control" id="searchInput" placeholder="Search new users..."></div></div>
            <div class="col-md-3"><select class="form-select" id="statusFilter"><option value="">All Status</option><option value="Pending">Pending</option><option value="Approved">Approved</option><option value="Rejected">Rejected</option></select></div>
            <div class="col-md-3 text-end"><span class="badge bg-primary" id="userCount">0 users</span></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">Borrower account registrations</div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead class="table-light"><tr><th class="ps-3">User</th><th>Type</th><th>Contact</th><th>Address</th><th>ID/Document</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody id="usersTable"><tr><td colspan="7" class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm me-2"></div>Loading...</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="rejectModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
      <div class="modal-header"><h5 class="modal-title"><i class="bi bi-x-circle me-2"></i>Reject New User</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="rejectUserId">
        <label class="form-label" for="rejectNotes">Reason</label>
        <textarea class="form-control" id="rejectNotes" rows="3" placeholder="Reason for rejection"></textarea>
        <div class="alert alert-danger d-none mt-3" id="rejectError"></div>
      </div>
      <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button type="button" class="btn btn-danger" onclick="submitReject()"><i class="bi bi-x-circle me-2"></i>Reject</button></div>
    </div></div>
  </div>

  <div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999"><div id="toast" class="toast align-items-center text-white border-0" role="alert"><div class="d-flex"><div class="toast-body" id="toastMessage"></div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/pages/login.html';
    const fullName = localStorage.getItem('full_name') || 'Admin';
    const role = localStorage.getItem('role') || 'staff';
    if (role !== 'admin' && role !== 'super_admin' && role !== 'staff') window.location.href = '/pages/dashboard.html';
    document.getElementById('userName').textContent = fullName;
    document.getElementById('userRole').textContent = role.charAt(0).toUpperCase() + role.slice(1);
    document.getElementById('userAvatar').textContent = fullName.charAt(0).toUpperCase();

    let allUsers = [];

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, function(char) {
        return ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[char];
      });
    }

    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.className = 'toast align-items-center text-white border-0 bg-' + (type || 'success');
      document.getElementById('toastMessage').textContent = message;
      new bootstrap.Toast(toast).show();
    }

    function statusBadge(status) {
      const colors = { Pending:'warning text-dark', Approved:'success', Rejected:'danger', Active:'success', Inactive:'secondary' };
      return '<span class="badge bg-' + (colors[status] || 'secondary') + '">' + escapeHtml(status) + '</span>';
    }

    async function api(path, options) {
      const headers = Object.assign({ authorization: token }, options && options.headers ? options.headers : {});
      const res = await fetch(path, Object.assign({}, options || {}, { headers: headers }));
      if (res.status === 403) logout();
      return res;
    }

    async function loadUsers() {
      const res = await api('/api/auth/users');
      const data = await res.json();
      if (!res.ok) {
        showToast(data.message || 'Unable to load new users.', 'danger');
        return;
      }
      allUsers = data.filter(function(user) { return user.role === 'borrower'; });
      filterUsers();
    }

    function renderUsers(data) {
      const tbody = document.getElementById('usersTable');
      document.getElementById('userCount').textContent = data.length + ' users';
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted">No borrower registrations found.</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(function(user) {
        const initial = (user.full_name || user.username || '?').charAt(0).toUpperCase();
        const documentLink = user.verification_document
          ? '<a href="' + escapeHtml(user.verification_document) + '" target="_blank" rel="noopener">View captured ID</a>'
          : '<span class="text-muted">No document</span>';
        const pendingReview = user.status === 'Pending' || user.verification_status === 'Pending';
        const approvedReview = user.status === 'Approved' || user.verification_status === 'Approved' || user.status === 'Active';
        const actions = pendingReview
          ? '<div class="bh-action-group">' +
            '<button class="btn btn-outline-success btn-icon" onclick="approveUser(' + user.user_id + ')" title="Approve"><i class="bi bi-check2"></i></button>' +
            '<button class="btn btn-outline-danger btn-icon" onclick="openRejectModal(' + user.user_id + ')" title="Reject"><i class="bi bi-x-lg"></i></button>' +
            '</div>'
          : approvedReview
            ? '<div class="bh-action-group"><button class="btn btn-outline-primary btn-icon" onclick="resendApprovalEmail(' + user.user_id + ')" title="Resend approval email"><i class="bi bi-envelope"></i></button></div>'
            : '<span class="text-muted small">Reviewed</span>';
        return '<tr>' +
          '<td class="ps-3"><div class="d-flex align-items-center gap-2"><div class="user-avatar">' + initial + '</div><div><div>' + escapeHtml(user.full_name) + '</div><small class="text-muted">' + escapeHtml(user.username) + '</small></div></div></td>' +
          '<td>' + escapeHtml(user.borrower_type || 'Borrower') + '</td>' +
          '<td>' + escapeHtml(user.contact_number || '-') + '</td>' +
          '<td>' + escapeHtml(user.address || '-') + '</td>' +
          '<td>' + documentLink + '<br><small class="text-muted">' + escapeHtml(user.valid_id_reference || '') + '</small></td>' +
          '<td>' + statusBadge(user.status || user.verification_status || 'Pending') + '</td>' +
          '<td>' + actions + '</td>' +
        '</tr>';
      }).join('');
    }

    function filterUsers() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const status = document.getElementById('statusFilter').value;
      const filtered = allUsers.filter(function(user) {
        const text = [user.full_name, user.username, user.borrower_type, user.address, user.contact_number, user.valid_id_reference].join(' ').toLowerCase();
        const userStatus = user.status || user.verification_status || 'Pending';
        return text.includes(search) && (!status || userStatus === status);
      });
      renderUsers(filtered);
    }

    async function updateVerification(id, status, notes) {
      const res = await api('/api/auth/users/' + id + '/verification', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: status, notes: notes || '' })
      });
      const data = await res.json();
      if (res.ok) {
        const emailNote = status === 'Approved'
          ? (data.email_sent ? ' Approval email sent.' : data.email_skipped_reason ? ' Approval email not sent: ' + data.email_skipped_reason + '.' : '')
          : '';
        showToast('New user ' + status.toLowerCase() + '.' + emailNote, status === 'Approved' ? 'success' : 'danger');
        loadUsers();
      } else {
        showToast(data.message || 'Unable to update new user account.', 'danger');
      }
      return res.ok;
    }

    async function approveUser(id) {
      await updateVerification(id, 'Approved', '');
    }

    async function resendApprovalEmail(id) {
      const res = await api('/api/auth/users/' + id + '/resend-approval-email', { method: 'POST' });
      const data = await res.json();
      if (res.ok) {
        showToast(data.message || 'Approval email sent.', 'success');
      } else {
        showToast(data.message || (data.email_error ? 'Approval email could not be sent: ' + data.email_error : 'Approval email was not sent.'), 'danger');
      }
    }

    function openRejectModal(id) {
      document.getElementById('rejectUserId').value = id;
      document.getElementById('rejectNotes').value = '';
      document.getElementById('rejectError').classList.add('d-none');
      new bootstrap.Modal(document.getElementById('rejectModal')).show();
    }

    async function submitReject() {
      const id = document.getElementById('rejectUserId').value;
      const ok = await updateVerification(id, 'Rejected', document.getElementById('rejectNotes').value.trim());
      if (ok) bootstrap.Modal.getInstance(document.getElementById('rejectModal')).hide();
    }

    function logout() {
      localStorage.clear();
      window.location.href = '/pages/login.html';
    }

    document.getElementById('searchInput').addEventListener('input', filterUsers);
    document.getElementById('statusFilter').addEventListener('change', filterUsers);
    loadUsers();
  </script>
</body>
</html>
