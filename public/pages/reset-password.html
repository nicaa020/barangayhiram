<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - BarangayHiram</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/app.css" rel="stylesheet">
  <style>
    body { min-height: 100vh; background: var(--bh-bg); color: var(--bh-text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .auth-wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .auth-card { width: min(460px, 100%); background: var(--bh-surface); border: .5px solid var(--bh-border-soft); border-radius: var(--bh-radius-lg); padding: 26px; box-shadow: var(--bh-shadow-sm); }
    .brand-mark { width: 48px; height: 48px; border-radius: var(--bh-radius-lg); display: grid; place-items: center; background: var(--bh-accent); color: #fff; font-weight: 700; margin-bottom: 16px; }
    .auth-title { font-size: 24px; font-weight: 600; margin-bottom: 6px; }
    .auth-copy { color: var(--bh-text-muted); margin-bottom: 18px; }
    .btn-portal { width: 100%; min-height: 38px; border: 1px solid var(--bh-accent); border-radius: var(--bh-radius); background: var(--bh-accent); color: #fff; font-weight: 500; }
    .btn-portal:hover { background: var(--bh-accent-dark); border-color: var(--bh-accent-dark); }
    .password-rules { color: var(--bh-text-muted); font-size: 13px; margin-top: 8px; }
    .password-toggle { border-left: 0; }
  </style>
</head>
<body class="bh-ui">
  <main class="auth-wrap">
    <section class="auth-card">
      <div class="brand-mark">BH</div>
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-copy">Enter a new password for your BarangayHiram account.</p>

      <div class="alert d-none" id="messageBox"></div>

      <form id="resetPasswordForm" novalidate>
        <div class="mb-3">
          <label class="form-label" for="newPassword">New password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input class="form-control" id="newPassword" type="password" autocomplete="new-password" required>
            <button class="btn btn-outline-secondary password-toggle" type="button" data-target="newPassword" aria-label="Show or hide password">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <div class="password-rules">Use at least 8 characters with uppercase, lowercase, number, and special character.</div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="confirmPassword">Confirm password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input class="form-control" id="confirmPassword" type="password" autocomplete="new-password" required>
            <button class="btn btn-outline-secondary password-toggle" type="button" data-target="confirmPassword" aria-label="Show or hide password">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <button class="btn-portal" id="submitBtn" type="submit">Update password</button>
      </form>

      <div class="text-center mt-3">
        <a href="/pages/login.html" class="text-decoration-none">Back to login</a>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-browser.js"></script>
  <script>
    function showMessage(type, message) {
      const box = document.getElementById('messageBox');
      box.className = 'alert alert-' + type;
      box.textContent = message;
      box.classList.remove('d-none');
    }

    function isStrongPassword(password) {
      return password.length >= 8 &&
        /[A-Z]/.test(password) &&
        /[a-z]/.test(password) &&
        /[0-9]/.test(password) &&
        /[^A-Za-z0-9]/.test(password);
    }

    document.querySelectorAll('.password-toggle').forEach(function(button) {
      button.addEventListener('click', function() {
        const input = document.getElementById(button.dataset.target);
        const icon = button.querySelector('i');
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        icon.className = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';
      });
    });

    document.getElementById('resetPasswordForm').addEventListener('submit', async function(event) {
      event.preventDefault();
      const button = document.getElementById('submitBtn');
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!newPassword || !confirmPassword) {
        showMessage('danger', 'Please enter and confirm your new password.');
        return;
      }

      if (newPassword !== confirmPassword) {
        showMessage('danger', 'Password and confirm password do not match.');
        return;
      }

      if (!isStrongPassword(newPassword)) {
        showMessage('danger', 'Password must be at least 8 characters and include uppercase, lowercase, number, and special character.');
        return;
      }

      button.disabled = true;
      button.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Updating';
      try {
        const supabase = await window.getBarangayHiramSupabase();
        const result = await supabase.auth.updateUser({ password: newPassword });
        if (result.error) throw result.error;
        showMessage('success', 'Password updated successfully. Redirecting to login...');
        setTimeout(function() {
          window.location.href = '/login';
        }, 1200);
      } catch (err) {
        showMessage('danger', err.message || 'Unable to update password. Please open the latest reset link from your email.');
      } finally {
        button.disabled = false;
        button.textContent = 'Update password';
      }
    });
  </script>
</body>
</html>
