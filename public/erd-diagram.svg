<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1000" viewBox="0 0 1500 1000">
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .entity { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 8; }
      .header { fill: #0d6efd; }
      .audit-header { fill: #198754; }
      .title { fill: #ffffff; font: 700 22px Arial, sans-serif; }
      .field { fill: #111827; font: 16px Arial, sans-serif; }
      .pk { font-weight: 700; fill: #0d6efd; }
      .fk { font-weight: 700; fill: #198754; }
      .rel { stroke: #374151; stroke-width: 2.5; fill: none; }
      .label { fill: #374151; font: 15px Arial, sans-serif; }
      .badge { fill: #eef2ff; stroke: #c7d2fe; stroke-width: 1; rx: 12; }
      .badge-text { fill: #3730a3; font: 13px Arial, sans-serif; }
    </style>
    <marker id="crow" markerWidth="16" markerHeight="16" refX="14" refY="8" orient="auto">
      <path d="M2,2 L14,8 L2,14 M14,8 L2,8" stroke="#374151" stroke-width="2" fill="none"/>
    </marker>
    <marker id="one" markerWidth="12" markerHeight="12" refX="2" refY="6" orient="auto">
      <path d="M2,1 L2,11" stroke="#374151" stroke-width="2"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="1000"/>
  <text x="750" y="54" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="34" font-weight="700">BarangayHiram Entity Relationship Diagram</text>
  <text x="750" y="84" text-anchor="middle" fill="#4b5563" font-family="Arial, sans-serif" font-size="17">Equipment borrowing, returns, users, and audit trail relationships</text>

  <g id="users" transform="translate(80 140)">
    <rect class="entity" width="290" height="265"/>
    <rect class="header" width="290" height="52" rx="8"/>
    <text class="title" x="145" y="34" text-anchor="middle">USERS</text>
    <text class="field pk" x="22" y="84">PK user_id</text>
    <text class="field" x="22" y="114">username</text>
    <text class="field" x="22" y="144">password</text>
    <text class="field" x="22" y="174">full_name</text>
    <text class="field" x="22" y="204">role</text>
    <text class="field" x="22" y="234">status</text>
    <text class="field" x="22" y="264">created_at</text>
  </g>

  <g id="borrowers" transform="translate(80 595)">
    <rect class="entity" width="290" height="205"/>
    <rect class="header" width="290" height="52" rx="8"/>
    <text class="title" x="145" y="34" text-anchor="middle">BORROWERS</text>
    <text class="field pk" x="22" y="84">PK borrower_id</text>
    <text class="field" x="22" y="114">full_name</text>
    <text class="field" x="22" y="144">address</text>
    <text class="field" x="22" y="174">contact_number</text>
    <text class="field" x="22" y="204">created_at</text>
  </g>

  <g id="equipment" transform="translate(1080 555)">
    <rect class="entity" width="315" height="265"/>
    <rect class="header" width="315" height="52" rx="8"/>
    <text class="title" x="158" y="34" text-anchor="middle">EQUIPMENT</text>
    <text class="field pk" x="22" y="84">PK equipment_id</text>
    <text class="field" x="22" y="114">name</text>
    <text class="field" x="22" y="144">category</text>
    <text class="field" x="22" y="174">description</text>
    <text class="field" x="22" y="204">quantity</text>
    <text class="field" x="22" y="234">available_quantity</text>
    <text class="field" x="22" y="264">status, created_at</text>
  </g>

  <g id="transactions" transform="translate(565 560)">
    <rect class="entity" width="345" height="305"/>
    <rect class="header" width="345" height="52" rx="8"/>
    <text class="title" x="172" y="34" text-anchor="middle">TRANSACTIONS</text>
    <text class="field pk" x="22" y="84">PK transaction_id</text>
    <text class="field fk" x="22" y="114">FK borrower_id</text>
    <text class="field fk" x="22" y="144">FK equipment_id</text>
    <text class="field" x="22" y="174">quantity_borrowed</text>
    <text class="field" x="22" y="204">purpose</text>
    <text class="field" x="22" y="234">date_borrowed</text>
    <text class="field" x="22" y="264">due_date</text>
    <text class="field" x="22" y="294">status, created_at</text>
  </g>

  <g id="returns" transform="translate(1080 145)">
    <rect class="entity" width="315" height="235"/>
    <rect class="header" width="315" height="52" rx="8"/>
    <text class="title" x="158" y="34" text-anchor="middle">RETURNS</text>
    <text class="field pk" x="22" y="84">PK return_id</text>
    <text class="field fk" x="22" y="114">FK transaction_id</text>
    <text class="field" x="22" y="144">actual_return_date</text>
    <text class="field" x="22" y="174">condition_on_return</text>
    <text class="field" x="22" y="204">remarks</text>
    <text class="field" x="22" y="234">created_at</text>
  </g>

  <g id="activity" transform="translate(555 135)">
    <rect class="entity" width="370" height="335"/>
    <rect class="audit-header" width="370" height="52" rx="8"/>
    <text class="title" x="185" y="34" text-anchor="middle">ACTIVITY_LOGS</text>
    <text class="field pk" x="22" y="84">PK log_id</text>
    <text class="field fk" x="22" y="114">FK user_id</text>
    <text class="field fk" x="22" y="144">FK borrower_id</text>
    <text class="field fk" x="22" y="174">FK equipment_id</text>
    <text class="field fk" x="22" y="204">FK transaction_id</text>
    <text class="field fk" x="22" y="234">FK return_id</text>
    <text class="field" x="22" y="264">action</text>
    <text class="field" x="22" y="294">details</text>
    <text class="field" x="22" y="324">timestamp</text>
  </g>

  <path class="rel" marker-start="url(#one)" marker-end="url(#crow)" d="M370 705 C450 705 485 705 565 705"/>
  <text class="label" x="455" y="685" text-anchor="middle">makes</text>

  <path class="rel" marker-start="url(#one)" marker-end="url(#crow)" d="M1080 705 C1015 705 975 705 910 705"/>
  <text class="label" x="995" y="685" text-anchor="middle">borrowed in</text>

  <path class="rel" marker-start="url(#one)" marker-end="url(#crow)" d="M910 600 C990 505 1030 410 1080 300"/>
  <text class="label" x="1005" y="455" text-anchor="middle">has return</text>

  <path class="rel" marker-start="url(#one)" marker-end="url(#crow)" d="M370 265 C445 265 480 265 555 265"/>
  <text class="label" x="462" y="245" text-anchor="middle">performs</text>

  <path class="rel" marker-start="url(#one)" marker-end="url(#crow)" d="M225 595 C280 485 390 390 555 345"/>
  <text class="label" x="385" y="445" text-anchor="middle">referenced by</text>

  <path class="rel" marker-start="url(#one)" marker-end="url(#crow)" d="M1080 625 C990 555 930 490 850 470"/>
  <text class="label" x="980" y="530" text-anchor="middle">referenced by</text>

  <path class="rel" marker-start="url(#one)" marker-end="url(#crow)" d="M735 560 C735 520 735 510 735 470"/>
  <text class="label" x="805" y="523" text-anchor="middle">referenced by</text>

  <path class="rel" marker-start="url(#one)" marker-end="url(#crow)" d="M1080 230 C1015 230 990 245 925 275"/>
  <text class="label" x="1002" y="210" text-anchor="middle">referenced by</text>

  <rect class="badge" x="548" y="910" width="405" height="34"/>
  <text class="badge-text" x="750" y="932" text-anchor="middle">PK = Primary Key, FK = Foreign Key, crowfoot = many records</text>
</svg>
