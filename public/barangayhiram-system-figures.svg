<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="2200" viewBox="0 0 1400 2200">
  <defs>
    <style>
      .page { fill: #ffffff; }
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .section { font: 700 22px Arial, sans-serif; fill: #111827; }
      .box { fill: #f8fafc; stroke: #111827; stroke-width: 2; }
      .system { fill: #e0f2fe; stroke: #075985; stroke-width: 2.5; }
      .store { fill: #ecfdf5; stroke: #166534; stroke-width: 2; }
      .actor { fill: #fff7ed; stroke: #9a3412; stroke-width: 2; }
      .text { font: 16px Arial, sans-serif; fill: #111827; }
      .small { font: 14px Arial, sans-serif; fill: #111827; }
      .label { font: 13px Arial, sans-serif; fill: #374151; }
      .line { stroke: #111827; stroke-width: 2; fill: none; }
      .dash { stroke: #111827; stroke-width: 2; fill: none; stroke-dasharray: 7 5; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#111827"/>
    </marker>
  </defs>

  <rect class="page" x="0" y="0" width="1400" height="2200"/>
  <text class="title" x="700" y="50" text-anchor="middle">BarangayHiram System Diagrams</text>

  <!-- Context Diagram -->
  <text class="section" x="70" y="105">1. Context Diagram</text>
  <rect class="actor" x="80" y="135" width="280" height="120"/>
  <text class="text" x="220" y="165" text-anchor="middle">Barangay Staff / Admin</text>
  <text class="small" x="100" y="195">Login credentials</text>
  <text class="small" x="100" y="218">Equipment and borrower records</text>
  <text class="small" x="100" y="241">Transaction and return details</text>

  <rect class="system" x="470" y="135" width="460" height="150"/>
  <text class="text" x="700" y="165" text-anchor="middle">BarangayHiram Equipment Lending System</text>
  <text class="small" x="500" y="198">Manage equipment, borrowers, borrowing transactions,</text>
  <text class="small" x="500" y="221">returns, reports, dashboard, and activity logs.</text>

  <rect class="actor" x="1040" y="135" width="280" height="120"/>
  <text class="text" x="1180" y="165" text-anchor="middle">Borrower / Resident</text>
  <text class="small" x="1060" y="195">Personal information</text>
  <text class="small" x="1060" y="218">Borrow request</text>
  <text class="small" x="1060" y="241">Returned equipment</text>

  <line class="line" x1="360" y1="190" x2="470" y2="190" marker-end="url(#arrow)"/>
  <line class="line" x1="470" y1="240" x2="360" y2="240" marker-end="url(#arrow)"/>
  <line class="line" x1="1040" y1="190" x2="930" y2="190" marker-end="url(#arrow)"/>
  <line class="line" x1="930" y1="240" x2="1040" y2="240" marker-end="url(#arrow)"/>

  <text class="label" x="380" y="178">Input data</text>
  <text class="label" x="370" y="265">Reports / status</text>
  <text class="label" x="950" y="178">Request / return</text>
  <text class="label" x="965" y="265">Confirmation</text>

  <!-- DFD -->
  <text class="section" x="70" y="350">2. Data Flow Diagram - Level 0</text>
  <rect class="actor" x="80" y="390" width="230" height="70"/>
  <text class="text" x="195" y="432" text-anchor="middle">Staff / Admin</text>

  <rect class="box" x="430" y="380" width="260" height="90"/>
  <text class="text" x="560" y="415" text-anchor="middle">1.0 Manage</text>
  <text class="text" x="560" y="440" text-anchor="middle">Authentication</text>
  <rect class="store" x="830" y="390" width="250" height="70"/>
  <text class="text" x="955" y="432" text-anchor="middle">Users Database</text>
  <line class="line" x1="310" y1="425" x2="430" y2="425" marker-end="url(#arrow)"/>
  <line class="line" x1="690" y1="425" x2="830" y2="425" marker-end="url(#arrow)"/>

  <rect class="box" x="160" y="530" width="260" height="85"/>
  <text class="text" x="290" y="565" text-anchor="middle">2.0 Manage</text>
  <text class="text" x="290" y="590" text-anchor="middle">Equipment</text>
  <rect class="store" x="520" y="535" width="250" height="70"/>
  <text class="text" x="645" y="577" text-anchor="middle">Equipment Database</text>
  <line class="line" x1="420" y1="572" x2="520" y2="572" marker-end="url(#arrow)"/>

  <rect class="box" x="160" y="655" width="260" height="85"/>
  <text class="text" x="290" y="690" text-anchor="middle">3.0 Manage</text>
  <text class="text" x="290" y="715" text-anchor="middle">Borrowers</text>
  <rect class="store" x="520" y="660" width="250" height="70"/>
  <text class="text" x="645" y="702" text-anchor="middle">Borrowers Database</text>
  <line class="line" x1="420" y1="697" x2="520" y2="697" marker-end="url(#arrow)"/>

  <rect class="box" x="160" y="780" width="260" height="95"/>
  <text class="text" x="290" y="815" text-anchor="middle">4.0 Process</text>
  <text class="text" x="290" y="840" text-anchor="middle">Borrowing Transaction</text>
  <rect class="store" x="520" y="790" width="250" height="70"/>
  <text class="text" x="645" y="832" text-anchor="middle">Transactions Database</text>
  <line class="line" x1="420" y1="828" x2="520" y2="828" marker-end="url(#arrow)"/>

  <rect class="box" x="160" y="920" width="260" height="95"/>
  <text class="text" x="290" y="955" text-anchor="middle">5.0 Process</text>
  <text class="text" x="290" y="980" text-anchor="middle">Equipment Return</text>
  <rect class="store" x="520" y="925" width="250" height="70"/>
  <text class="text" x="645" y="967" text-anchor="middle">Returns Database</text>
  <line class="line" x1="420" y1="967" x2="520" y2="967" marker-end="url(#arrow)"/>

  <rect class="box" x="160" y="1060" width="260" height="95"/>
  <text class="text" x="290" y="1095" text-anchor="middle">6.0 Generate</text>
  <text class="text" x="290" y="1120" text-anchor="middle">Reports and Dashboard</text>
  <rect class="store" x="520" y="1065" width="250" height="70"/>
  <text class="text" x="645" y="1107" text-anchor="middle">Reports Data</text>
  <line class="line" x1="420" y1="1107" x2="520" y2="1107" marker-end="url(#arrow)"/>

  <rect class="store" x="930" y="720" width="250" height="80"/>
  <text class="text" x="1055" y="753" text-anchor="middle">Activity Logs</text>
  <text class="small" x="1055" y="778" text-anchor="middle">Recorded user actions</text>
  <line class="dash" x1="420" y1="572" x2="930" y2="740" marker-end="url(#arrow)"/>
  <line class="dash" x1="420" y1="697" x2="930" y2="755" marker-end="url(#arrow)"/>
  <line class="dash" x1="420" y1="828" x2="930" y2="770" marker-end="url(#arrow)"/>
  <line class="dash" x1="420" y1="967" x2="930" y2="785" marker-end="url(#arrow)"/>

  <!-- Use Case -->
  <text class="section" x="70" y="1225">3. Use Case Diagram</text>
  <rect class="actor" x="90" y="1270" width="190" height="65"/>
  <text class="text" x="185" y="1310" text-anchor="middle">Admin</text>
  <rect class="actor" x="90" y="1390" width="190" height="65"/>
  <text class="text" x="185" y="1430" text-anchor="middle">Barangay Staff</text>
  <rect class="actor" x="90" y="1510" width="190" height="65"/>
  <text class="text" x="185" y="1550" text-anchor="middle">Borrower / Resident</text>

  <rect class="system" x="430" y="1245" width="760" height="370"/>
  <text class="text" x="810" y="1280" text-anchor="middle">BarangayHiram Equipment Lending System</text>
  <rect class="box" x="470" y="1310" width="300" height="45"/><text class="small" x="620" y="1338" text-anchor="middle">Login / Logout</text>
  <rect class="box" x="830" y="1310" width="300" height="45"/><text class="small" x="980" y="1338" text-anchor="middle">Manage Staff Accounts</text>
  <rect class="box" x="470" y="1375" width="300" height="45"/><text class="small" x="620" y="1403" text-anchor="middle">Manage Equipment</text>
  <rect class="box" x="830" y="1375" width="300" height="45"/><text class="small" x="980" y="1403" text-anchor="middle">Manage Borrowers</text>
  <rect class="box" x="470" y="1440" width="300" height="45"/><text class="small" x="620" y="1468" text-anchor="middle">Create Borrowing Transaction</text>
  <rect class="box" x="830" y="1440" width="300" height="45"/><text class="small" x="980" y="1468" text-anchor="middle">Check Equipment Availability</text>
  <rect class="box" x="470" y="1505" width="300" height="45"/><text class="small" x="620" y="1533" text-anchor="middle">Process Equipment Return</text>
  <rect class="box" x="830" y="1505" width="300" height="45"/><text class="small" x="980" y="1533" text-anchor="middle">View Dashboard / Reports</text>
  <line class="line" x1="280" y1="1303" x2="430" y2="1375" marker-end="url(#arrow)"/>
  <line class="line" x1="280" y1="1423" x2="430" y2="1445" marker-end="url(#arrow)"/>
  <line class="line" x1="280" y1="1543" x2="430" y2="1505" marker-end="url(#arrow)"/>

  <!-- System Flowchart -->
  <text class="section" x="70" y="1690">4. System Flowchart</text>
  <rect class="box" x="530" y="1720" width="340" height="48"/><text class="text" x="700" y="1751" text-anchor="middle">Start</text>
  <rect class="box" x="530" y="1790" width="340" height="48"/><text class="text" x="700" y="1821" text-anchor="middle">Open BarangayHiram website</text>
  <rect class="box" x="530" y="1860" width="340" height="48"/><text class="text" x="700" y="1891" text-anchor="middle">Enter username and password</text>
  <rect class="box" x="530" y="1930" width="340" height="48"/><text class="text" x="700" y="1961" text-anchor="middle">Check login credentials</text>
  <rect class="box" x="250" y="2010" width="270" height="48"/><text class="text" x="385" y="2041" text-anchor="middle">Invalid: show error</text>
  <rect class="box" x="880" y="2010" width="270" height="48"/><text class="text" x="1015" y="2041" text-anchor="middle">Valid: display dashboard</text>
  <rect class="box" x="880" y="2080" width="270" height="48"/><text class="text" x="1015" y="2111" text-anchor="middle">Process selected function</text>
  <rect class="box" x="530" y="2080" width="270" height="48"/><text class="text" x="665" y="2111" text-anchor="middle">Logout and end</text>
  <line class="line" x1="700" y1="1768" x2="700" y2="1790" marker-end="url(#arrow)"/>
  <line class="line" x1="700" y1="1838" x2="700" y2="1860" marker-end="url(#arrow)"/>
  <line class="line" x1="700" y1="1908" x2="700" y2="1930" marker-end="url(#arrow)"/>
  <line class="line" x1="620" y1="1978" x2="520" y2="2010" marker-end="url(#arrow)"/>
  <line class="line" x1="780" y1="1978" x2="880" y2="2010" marker-end="url(#arrow)"/>
  <line class="line" x1="1015" y1="2058" x2="1015" y2="2080" marker-end="url(#arrow)"/>
  <line class="line" x1="880" y1="2104" x2="800" y2="2104" marker-end="url(#arrow)"/>
  <path class="line" d="M385 2010 L385 1884 L530 1884" marker-end="url(#arrow)"/>
</svg>
